<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f172a"/>
<title>PflegeTrainer 2.0 – Saarland 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;overscroll-behavior:none;min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:none;transition:all .15s}
button:active{transform:scale(.97);opacity:.85}
input{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}
.hide{display:none!important}

/* === NAV === */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #334155;display:flex;z-index:99;padding:4px 0 env(safe-area-inset-bottom,8px)}
.nav button{flex:1;background:none;color:#64748b;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;font-size:10px;font-weight:600}
.nav button.act{color:#10b981}
.nav button i{font-size:22px;font-style:normal}

/* === HEADER === */
.hdr{position:sticky;top:0;background:#0f172a;z-index:50;padding:12px 16px;border-bottom:1px solid #334155}
.hdr-r{max-width:540px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:17px;font-weight:800}
.hdr-badges{display:flex;gap:8px;align-items:center}
.badge{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:4px 12px;display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700}
.badge i{font-style:normal}

/* === SCROLL === */
.scr{max-width:540px;margin:0 auto;padding:12px 16px 100px}

/* === UNIT === */
.unit{margin-bottom:20px}
.unit-h{padding:12px 16px;border-radius:14px;display:flex;align-items:center;gap:12px;margin-bottom:6px}
.unit-h h2{font-size:14px;font-weight:700;flex:1}
.unit-h .ct{font-size:12px;font-weight:700;opacity:.8}
.unit-p{height:4px;border-radius:2px;margin:0 4px 10px;overflow:hidden;background:#1e293b}
.unit-p div{height:100%;border-radius:2px;transition:width .6s}

/* === SKILL === */
.sk{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;width:100%;margin-bottom:5px;text-align:left;color:#e2e8f0;background:#1e293b;border:1.5px solid #334155}
.sk.gold{border-color:#f59e0b;background:#f59e0b10}
.sk.done{border-color:#10b981;background:#10b98110}
.sk.locked{opacity:.35;pointer-events:none}
.sk-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sk-info{flex:1}
.sk-t{font-weight:600;font-size:14px}
.sk-s{font-size:11px;margin-top:2px;color:#94a3b8}
.sk.done .sk-s{color:#10b981}
.sk.gold .sk-s{color:#f59e0b}
.crowns{display:flex;gap:1px;margin-top:3px}
.crowns i{font-style:normal;font-size:12px}

/* === LESSON BAR === */
.lb{display:flex;align-items:center;gap:10px;padding:12px 16px;position:sticky;top:0;background:#0f172a;z-index:50}
.lb .x{background:none;color:#64748b;font-size:24px;padding:0 4px}
.lb-p{flex:1;height:8px;background:#334155;border-radius:4px;overflow:hidden}
.lb-p div{height:100%;background:#10b981;border-radius:4px;transition:width .4s}
.lb-h{display:flex;gap:2px}
.lb-h i{font-style:normal;font-size:16px}

/* === QUESTION === */
.qw{padding:8px 16px 200px}
.qt{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.qq{font-size:15px;font-weight:600;line-height:1.7;margin-bottom:18px}

/* === OPTIONS === */
.opt{width:100%;padding:12px 14px;background:#1e293b;border:1.5px solid #334155;border-radius:12px;color:#e2e8f0;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:14px}
.opt .l{width:26px;height:26px;border-radius:7px;background:#334155;color:#10b981;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.opt.ok{background:#065f46;border-color:#10b981;color:#10b981}
.opt.no{background:#7f1d1d;border-color:#ef4444;color:#ef4444}
.opt.dim{opacity:.3}

/* === TF === */
.tfr{display:flex;gap:10px}
.tfb{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:16px;background:#1e293b;border:1.5px solid #334155;color:#e2e8f0}
.tfb.ok{background:#065f46;border-color:#10b981;color:#10b981}
.tfb.no{background:#7f1d1d;border-color:#ef4444;color:#ef4444}

/* === FILL === */
.flr{display:flex;gap:8px}
.fli{flex:1;padding:12px 14px;background:#1e293b;border:1.5px solid #334155;border-radius:12px;color:#e2e8f0;font-size:14px;outline:none}
.fli:focus{border-color:#10b981}
.flg{padding:12px 18px;background:#10b981;color:#fff;border-radius:12px;font-weight:700;font-size:16px}
.flx{padding:12px 15px;border-radius:12px;font-size:14px;font-weight:600}
.flx.ok{background:#065f46;border:1.5px solid #10b981;color:#10b981}
.flx.no{background:#7f1d1d;border:1.5px solid #ef4444;color:#ef4444}

/* === MATCH === */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mb{padding:10px;border-radius:10px;font-size:12px;text-align:center;font-weight:500;border:1.5px solid #334155;background:#1e293b;color:#e2e8f0;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.4}
.mb.sel{border-color:#3b82f6;background:#3b82f610;color:#3b82f6}
.mb.ok{border-color:#10b981;background:#065f46;color:#10b981;opacity:.6;pointer-events:none}
.mb.err{border-color:#ef4444;background:#7f1d1d;color:#ef4444}

/* === FEEDBACK === */
.fb{position:fixed;bottom:0;left:0;right:0;padding:16px 16px calc(16px + env(safe-area-inset-bottom,8px));z-index:60}
.fb.ok{background:#064e3b;border-top:3px solid #10b981}
.fb.no{background:#450a0a;border-top:3px solid #ef4444}
.fb-i{max-width:540px;margin:0 auto}
.fb-r{display:flex;gap:10px;margin-bottom:12px}
.fb-e{font-size:20px;flex-shrink:0}
.fb-t{font-weight:700;font-size:14px;margin-bottom:3px}
.fb-w{font-size:13px;color:#cbd5e1;line-height:1.6}
.fb-b{width:100%;padding:13px;border-radius:13px;font-weight:700;font-size:16px;color:#fff}
.fb-b.ok{background:#10b981}
.fb-b.no{background:#ef4444}

/* === RESULT === */
.res{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.res-i{max-width:380px;width:100%;text-align:center}
.res-e{font-size:64px;margin-bottom:14px}
.res-t{font-weight:800;font-size:24px;margin-bottom:4px}
.res-s{color:#94a3b8;font-size:14px;margin-bottom:26px}
.res-g{background:#1e293b;border-radius:18px;padding:20px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.res-n{font-size:28px;font-weight:800}
.res-l{font-size:11px;color:#94a3b8}
.res-p{background:#065f46;border-radius:12px;padding:10px;margin-bottom:14px;color:#10b981;font-size:13px;font-weight:600}
.gb{padding:13px 18px;border-radius:13px;font-weight:700;font-size:16px;width:100%;margin-bottom:8px}
.gb-g{background:#10b981;color:#fff}
.gb-o{background:transparent;color:#e2e8f0;border:1.5px solid #334155}

/* === PRACTICE BANNER === */
.pban{background:linear-gradient(135deg,#f59e0b20,#f59e0b05);border:1.5px solid #f59e0b40;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.pban i{font-style:normal;font-size:24px}
.pban-t{font-weight:700;font-size:14px;color:#f59e0b}
.pban-s{font-size:11px;color:#94a3b8;margin-top:2px}

/* === PROFILE === */
.pcard{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #334155}
.pcard h3{font-size:13px;color:#94a3b8;margin-bottom:10px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.pval{font-weight:700;font-size:16px}
.pbtn{margin-top:8px;padding:10px;border-radius:10px;width:100%;font-size:13px;font-weight:600;background:#334155;color:#e2e8f0}

/* === DAILY GOAL === */
.dg{background:#1e293b;border-radius:14px;padding:14px 16px;margin-bottom:16px;border:1px solid #334155}
.dg-t{font-size:12px;color:#94a3b8;margin-bottom:8px}
.dg-b{height:8px;background:#334155;border-radius:4px;overflow:hidden}
.dg-b div{height:100%;background:#10b981;border-radius:4px;transition:width .6s}
.dg-l{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#64748b}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const el=(t,p={},c='')=>{const e=document.createElement(t);Object.entries(p).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v)});if(typeof c==='string')e.innerHTML=c;else if(c instanceof HTMLElement)e.appendChild(c);else if(Array.isArray(c))c.forEach(x=>x&&e.appendChild(typeof x==='string'?document.createTextNode(x):x));return e};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function norm(s){return s.toLowerCase().trim().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]/g,'');}
function lev(a,b){if(!a.length)return b.length;if(!b.length)return a.length;const m=[];for(let i=0;i<=b.length;i++){m[i]=[i];for(let j=1;j<=a.length;j++)m[i][j]=i===0?j:0;}for(let i=1;i<=b.length;i++)for(let j=1;j<=a.length;j++)m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:1+Math.min(m[i-1][j-1],m[i][j-1],m[i-1][j]);return m[b.length][a.length];}
function fuzzy(u,a){const un=norm(u),an=norm(a);return un===an||un.includes(an)||an.includes(un)||lev(un,an)<=Math.max(2,Math.floor(an.length*0.25));}
const today=()=>new Date().toISOString().split('T')[0];

// ═══════════════════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════════════════
const SK='pt2-v1';
const DEFS={crowns:{},xp:0,streak:0,lastDay:'',dailyXP:0,dailyGoal:150,hearts:5,lastHearts:''};
let ST;
function load(){try{ST=JSON.parse(localStorage.getItem(SK))||{...DEFS};}catch{ST={...DEFS};}if(!ST.crowns)ST.crowns={};if(!ST.streak)ST.streak=0;}
function save(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch{}}
function getCrowns(sid){return ST.crowns[sid]||0;}
function addCrown(sid){ST.crowns[sid]=Math.min((ST.crowns[sid]||0)+1,5);save();}
function addXP(n){ST.xp+=n;ST.dailyXP+=n;const t=today();if(ST.lastDay!==t){if(ST.lastDay===new Date(Date.now()-86400000).toISOString().split('T')[0])ST.streak++;else if(ST.lastDay!==t)ST.streak=1;ST.lastDay=t;ST.dailyXP=n;}save();}
function refillHearts(){const t=today();if(ST.lastHearts!==t){ST.hearts=5;ST.lastHearts=t;save();}}

// Concepts: each one generates MC, TF, FILL, and sometimes MATCH questions
// {s:skillId, t:term/concept, a:answer, d:distractors, h:hint, f:fill_sentence}
const C=[
// ── PFLEGEPROZESS ────────────────────────────────────────────────────────
{s:"pp",t:"Anzahl Schritte Pflegeprozess",q:"Wie viele Schritte hat der Pflegeprozess nach Fiechter & Meier?",a:"6",d:["4","5","8"],h:"Info → Probleme → Ziele → Planung → Durchführung → Evaluation",f:"Der Pflegeprozess nach Fiechter & Meier hat ___ Schritte."},

{s:"pp",t:"Nach Zielformulierung",q:"Welcher Schritt folgt auf die Zielformulierung?",a:"Maßnahmenplanung",d:["Durchführung","Evaluation","Informationssammlung"],h:"Ziele → Maßnahmen planen → Durchführung → Evaluation",f:"Nach der Zielformulierung folgt die ___."},
{s:"pp",t:"Reihenfolge Pflegeprozess",q:"Richtige Reihenfolge: Info → Probleme → ?",a:"Ziele → Planung → Durchführung → Evaluation",d:["Durchführung → Planung → Ziele → Evaluation","Evaluation → Ziele → Planung → Durchführung","Planung → Ziele → Evaluation → Durchführung"],h:"6 Schritte: Info → Probleme → Ziele → Planung → Durchführung → Evaluation"},
{s:"pp",t:"Kreislauf Pflegeprozess",q:"Die Evaluation kann dazu führen, dass:",a:"Der gesamte Pflegeprozess angepasst und von vorne begonnen wird",d:["Der Patient entlassen wird","Keine weiteren Maßnahmen nötig sind","Die Dokumentation gelöscht wird"],h:"Pflegeprozess = KREISLAUF – Evaluation führt zurück zu Schritt 1"},

// ENGINE: Generate questions from concepts
// Each concept can appear as MC, TF, FILL, or MATCH
// ═══════════════════════════════════════════════════════════════════════════
function genMC(c){
  const opts=shuffle([c.a,...c.d]);
  return{type:'MC',q:c.q,opts,correct:opts.indexOf(c.a),hint:c.h,concept:c.t};
}
function genTF(c){
  // 50% true, 50% false
  if(Math.random()>0.5){
    return{type:'TF',q:c.q+' → '+c.a,correct:true,hint:c.h,concept:c.t};
  }else{
    const wrong=c.d[Math.floor(Math.random()*c.d.length)];
    return{type:'TF',q:c.q+' → '+wrong,correct:false,hint:'Richtig wäre: '+c.a+'. '+c.h,concept:c.t};
  }
}
function genFILL(c){
  if(!c.f)return null;
  return{type:'FILL',q:c.f,answer:c.a,hint:c.h,concept:c.t};
}
function genLesson(skillId,crown){
  const pool=C.filter(x=>x.s===skillId);
  if(!pool.length)return[];
  // Crown system: each level uses DIFFERENT subset + harder question types
  // Crown 0: first 60% of pool as MC (introduction)
  // Crown 1: last 60% of pool as MC+TF (new questions + review)
  // Crown 2: full pool shuffled, MC+TF+FILL (all content, mixed)
  // Crown 3: full pool, more FILL, fewer MC (harder)
  // Crown 4+: full pool, mostly FILL+TF (mastery)
  let qs=[];
  const half=Math.ceil(pool.length*0.6);
  let picked;
  if(crown===0) picked=shuffle(pool.slice(0,half)).slice(0,10);
  else if(crown===1) picked=shuffle(pool.slice(Math.max(0,pool.length-half))).slice(0,10);
  else picked=shuffle(pool).slice(0,12);

  picked.forEach((c,i)=>{
    if(crown===0){
      qs.push(genMC(c));
    }else if(crown===1){
      qs.push(i%2===0?genMC(c):genTF(c));
    }else if(crown===2){
      const fill=genFILL(c);
      if(i%3===0&&fill)qs.push(fill);
      else if(i%3===1)qs.push(genTF(c));
      else qs.push(genMC(c));
    }else if(crown===3){
      const fill=genFILL(c);
      const r=Math.random();
      if(r<0.4&&fill)qs.push(fill);
      else if(r<0.7)qs.push(genTF(c));
      else qs.push(genMC(c));
    }else{
      const fill=genFILL(c);
      if(fill&&Math.random()<0.5)qs.push(fill);
      else qs.push(genTF(c));
    }
  });
  return shuffle(qs).slice(0,10);
}

// APP STATE
// ═══════════════════════════════════════════════════════════════════════════
let view='home';// home, lesson, result, profile
let curSkill=null;
let questions=[];
let qi=0;
let lives=5;
let score=0;
let ans=null;
let feedback=false;
let fillVal='';

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render(){
  const app=$('#app');
  app.innerHTML='';
  refillHearts();
  if(view==='home')renderHome(app);
  else if(view==='lesson')renderLesson(app);
  else if(view==='result')renderResult(app);
  else if(view==='profile')renderProfile(app);
}

function renderNav(app){
  const nav=el('div',{class:'nav'});
  [{v:'home',i:'🏠',l:'Lernen'},{v:'profile',i:'👤',l:'Profil'}].forEach(n=>{
    nav.appendChild(el('button',{class:view===n.v?'act':'',onclick:()=>{view=n.v;render();}},`<i>${n.i}</i>${n.l}`));
  });
  app.appendChild(nav);
}

function isUnlocked(sk){
  if(!sk.pre)return true;
  return getCrowns(sk.pre)>=1;
}

function renderHome(app){
  // Header
  const hdr=el('div',{class:'hdr'});
  const hr=el('div',{class:'hdr-r'});
  hr.appendChild(el('h1',{},'🏥 PflegeTrainer'));
  const badges=el('div',{class:'hdr-badges'});
  badges.appendChild(el('div',{class:'badge'},`<i>🔥</i>${ST.streak}`));
  badges.appendChild(el('div',{class:'badge'},`<i>⭐</i>${ST.xp}`));
  hr.appendChild(badges);
  hdr.appendChild(hr);
  app.appendChild(hdr);

  const scr=el('div',{class:'scr'});

  // Daily goal
  const pct=Math.min(100,Math.round((ST.dailyXP/ST.dailyGoal)*100));
  const dg=el('div',{class:'dg'});
  dg.innerHTML=`<div class="dg-t">📅 Tagesziel: ${ST.dailyXP}/${ST.dailyGoal} XP</div><div class="dg-b"><div style="width:${pct}%;background:${pct>=100?'#f59e0b':'#10b981'}"></div></div><div class="dg-l"><span>${pct>=100?'✅ Geschafft!':'Weiter üben!'}</span><span>${Math.max(0,ST.dailyGoal-ST.dailyXP)} XP übrig</span></div>`;
  scr.appendChild(dg);

  // Practice banner (if any skills done)
  const doneSkills=SKILLS.filter(s=>getCrowns(s.id)>=1);
  if(doneSkills.length>0){
    const pb=el('button',{class:'pban',onclick:()=>{
      const rs=doneSkills[Math.floor(Math.random()*doneSkills.length)];
      startLesson(rs.id);
    }});
    pb.innerHTML=`<i>🔄</i><div><div class="pban-t">Übungsstunde</div><div class="pban-s">${doneSkills.length} Themen zum Wiederholen</div></div>`;
    scr.appendChild(pb);
  }

  // Units
  UNITS.forEach(u=>{
    const skills=SKILLS.filter(s=>s.u===u.id);
    const doneCnt=skills.filter(s=>getCrowns(s.id)>=1).length;
    const unit=el('div',{class:'unit'});

    const uh=el('div',{class:'unit-h',style:{background:u.c+'15',border:`1.5px solid ${u.c}30`}});
    uh.innerHTML=`<span style="font-size:22px">${u.e}</span><h2 style="color:${u.c}">${u.t}</h2><span class="ct" style="color:${u.c}">${doneCnt}/${skills.length}</span>`;
    unit.appendChild(uh);

    const up=el('div',{class:'unit-p'});
    up.innerHTML=`<div style="width:${skills.length?((doneCnt/skills.length)*100):0}%;background:${u.c}"></div>`;
    unit.appendChild(up);

    skills.forEach(sk=>{
      const cr=getCrowns(sk.id);
      const unlocked=isUnlocked(sk);
      const cls=cr>=5?'sk gold':cr>=1?'sk done':unlocked?'sk':'sk locked';
      const btn=el('button',{class:cls,onclick:()=>unlocked&&startLesson(sk.id)});
      const ic=el('div',{class:'sk-ic',style:{background:cr>=1?u.c+'20':'#334155'}});
      ic.textContent=cr>=5?'👑':sk.i;
      btn.appendChild(ic);
      const info=el('div',{class:'sk-info'});
      info.innerHTML=`<div class="sk-t">${sk.t}</div>`;
      const sub=cr>=5?'Gemeistert! Weiter üben →':cr>=1?`Crown ${cr}/5 · Tippen für nächstes Level`:(unlocked?'Tippen zum Starten →':'🔒 Vorheriges Thema abschließen');
      info.innerHTML+=`<div class="sk-s">${sub}</div>`;
      if(cr>0){
        const crowns=el('div',{class:'crowns'});
        for(let i=0;i<5;i++)crowns.appendChild(el('i',{},i<cr?'👑':'⚪'));
        info.appendChild(crowns);
      }
      btn.appendChild(info);
      unit.appendChild(btn);
    });
    scr.appendChild(unit);
  });

  // Block info
  scr.appendChild(el('div',{style:{textAlign:'center',padding:'16px 0',borderTop:'1px solid #334155',marginTop:'16px',color:'#64748b',fontSize:'11px'}},'Komplett: Tag 1–51 · Pflegeprozess · ABEDL · Assessment · Prophylaxen · Kommunikation · Ethik'));

  app.appendChild(scr);
  renderNav(app);
}

function startLesson(sid){
  curSkill=SKILLS.find(s=>s.id===sid);
  const cr=getCrowns(sid);
  questions=genLesson(sid,cr);
  if(!questions.length)return;
  qi=0;lives=5;score=0;ans=null;feedback=false;fillVal='';
  view='lesson';
  render();
}

function renderLesson(app){
  if(!questions.length||qi>=questions.length)return;
  const q=questions[qi];

  // Bar
  const bar=el('div',{class:'lb'});
  bar.appendChild(el('button',{class:'x',onclick:()=>{view='home';render();}},'\u00d7'));
  const prog=el('div',{class:'lb-p'});
  prog.innerHTML=`<div style="width:${(qi/questions.length)*100}%"></div>`;
  bar.appendChild(prog);
  const hearts=el('div',{class:'lb-h'});
  for(let i=0;i<5;i++)hearts.appendChild(el('i',{},i<lives?'❤️':'🖤'));
  bar.appendChild(hearts);
  app.appendChild(bar);

  app.appendChild(el('div',{style:{padding:'2px 16px 4px',color:'#64748b',fontSize:'11px'}},`${qi+1}/${questions.length} · ${curSkill.t}`));

  const qw=el('div',{class:'qw'});

  if(q.type==='MC')renderMC(qw,q);
  else if(q.type==='TF')renderTF(qw,q);
  else if(q.type==='FILL')renderFill(qw,q);

  app.appendChild(qw);

  if(feedback)renderFeedback(app,q);
}

function doAnswer(correct,q){
  if(feedback)return;
  feedback=true;
  if(correct)score++;
  else lives--;
  render();
}

function nextQ(){
  qi++;ans=null;feedback=false;fillVal='';
  if(qi>=questions.length||lives<=0){
    const earned=score*20;
    addXP(earned);
    if(score>=Math.ceil(questions.length*0.6))addCrown(curSkill.id);
    view='result';
  }
  render();
}

function renderMC(parent,q){
  parent.appendChild(el('div',{class:'qt'},'🎯 Multiple Choice'));
  parent.appendChild(el('div',{class:'qq'},q.q));
  const labels=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    let cls='opt';
    if(feedback){
      if(i===q.correct)cls='opt ok';
      else if(ans===i)cls='opt no';
      else cls='opt dim';
    }
    const btn=el('button',{class:cls,onclick:()=>{if(!feedback){ans=i;doAnswer(i===q.correct,q);}}});
    btn.innerHTML=`<span class="l">${labels[i]}</span><span>${opt}</span>`;
    parent.appendChild(btn);
  });
}

function renderTF(parent,q){
  parent.appendChild(el('div',{class:'qt'},'✓✗ Richtig oder Falsch?'));
  parent.appendChild(el('div',{class:'qq'},q.q));
  const row=el('div',{class:'tfr'});
  [true,false].forEach(val=>{
    let cls='tfb';
    if(feedback){
      if(val===q.correct)cls='tfb ok';
      else if(ans===val)cls='tfb no';
    }
    row.appendChild(el('button',{class:cls,onclick:()=>{if(!feedback){ans=val;doAnswer(val===q.correct,q);}}},val?'✅ Richtig':'❌ Falsch'));
  });
  parent.appendChild(row);
}

function renderFill(parent,q){
  parent.appendChild(el('div',{class:'qt'},'✏️ Lückentext'));
  const parts=q.q.split('___');
  const qDiv=el('div',{class:'qq'});
  qDiv.innerHTML=parts.map((p,i)=>p+(i<parts.length-1?`<span style="display:inline-block;min-width:80px;border-bottom:2px solid ${feedback?(ans==='ok'?'#10b981':'#ef4444'):'#475569'};padding:0 6px;margin:0 4px;color:${feedback?(ans==='ok'?'#10b981':'#ef4444'):'#94a3b8'};font-weight:${feedback?700:400}">${feedback?fillVal:'\u3000\u3000'}</span>`:'')).join('');
  parent.appendChild(qDiv);

  if(!feedback){
    const row=el('div',{class:'flr'});
    const inp=el('input',{class:'fli',placeholder:'Antwort eingeben...',value:fillVal,oninput:(e)=>{fillVal=e.target.value;},onkeydown:(e)=>{if(e.key==='Enter')checkFill(q);}});
    row.appendChild(inp);
    row.appendChild(el('button',{class:'flg',onclick:()=>checkFill(q)},'→'));
    parent.appendChild(row);
    setTimeout(()=>inp.focus(),100);
  }else{
    parent.appendChild(el('div',{class:ans==='ok'?'flx ok':'flx no'},ans==='ok'?'✓ Richtig!':`✗ Richtige Antwort: "${q.answer}"`));
  }
}

function checkFill(q){
  if(!fillVal.trim())return;
  const ok=fuzzy(fillVal,q.answer);
  ans=ok?'ok':'no';
  doAnswer(ok,q);
}

function renderFeedback(app,q){
  const correct=q.type==='FILL'?ans==='ok':q.type==='TF'?ans===q.correct:ans===q.correct;
  const fb=el('div',{class:'fb '+(correct?'ok':'no')});
  fb.innerHTML=`<div class="fb-i"><div class="fb-r"><span class="fb-e">${correct?'🎉':'💡'}</span><div><div class="fb-t" style="color:${correct?'#10b981':'#ef4444'}">${correct?'Richtig!':'Nicht ganz...'}</div><div class="fb-w">${q.hint||''}</div></div></div><button class="fb-b ${correct?'ok':'no'}" onclick="nextQ()">Weiter →</button></div>`;
  app.appendChild(fb);
}

function renderResult(app){
  const pct=Math.round((score/questions.length)*100);
  const passed=score>=Math.ceil(questions.length*0.6);
  const earned=score*20;
  const cr=getCrowns(curSkill.id);
  app.innerHTML=`<div class="res"><div class="res-i">
    <div class="res-e">${passed?(cr>=5?'🏆':'🎉'):'💪'}</div>
    <div class="res-t">${passed?(cr>=5?'Gemeistert!':'Level Up!'):'Weiter üben!'}</div>
    <div class="res-s">${curSkill.t}${passed?` · Crown ${cr}/5`:''}</div>
    <div class="res-g">
      <div><div class="res-n" style="color:${passed?'#10b981':'#ef4444'}">${pct}%</div><div class="res-l">Ergebnis</div></div>
      <div><div class="res-n" style="color:#f59e0b">+${earned}</div><div class="res-l">XP</div></div>
      <div><div class="res-n">${score}/${questions.length}</div><div class="res-l">Richtig</div></div>
    </div>
    ${passed?`<div class="res-p">✅ Crown ${cr}/5 erreicht!</div>`:''}
    <button class="gb gb-g" onclick="view='home';render();">Zur Übersicht</button>
    <button class="gb gb-o" onclick="startLesson('${curSkill.id}')">Nochmal üben</button>
  </div></div>`;
}

function renderProfile(app){
  const hdr=el('div',{class:'hdr'});
  hdr.innerHTML=`<div class="hdr-r"><h1>👤 Profil</h1></div>`;
  app.appendChild(hdr);
  const scr=el('div',{class:'scr'});
  const totalSkills=SKILLS.length;
  const doneSkills=SKILLS.filter(s=>getCrowns(s.id)>=1).length;
  const goldSkills=SKILLS.filter(s=>getCrowns(s.id)>=5).length;

  scr.innerHTML=`
    <div class="pcard"><h3>📊 Statistiken</h3>
      <div class="prow"><span>Gesamt-XP</span><span class="pval" style="color:#f59e0b">⭐ ${ST.xp}</span></div>
      <div class="prow"><span>Streak</span><span class="pval" style="color:#ef4444">🔥 ${ST.streak} Tage</span></div>
      <div class="prow"><span>Abgeschlossene Skills</span><span class="pval" style="color:#10b981">${doneSkills}/${totalSkills}</span></div>
      <div class="prow"><span>Gemeisterte Skills (5 Crowns)</span><span class="pval" style="color:#f59e0b">👑 ${goldSkills}</span></div>
    </div>
    <div class="pcard"><h3>🎯 Prüfungstermine</h3>
      <div class="prow"><span>✏️ Klausur 1–3</span><span class="pval">1.–3. Juli 2026</span></div>
      <div class="prow"><span>🏥 Praktisch</span><span class="pval">31. Juli 2026</span></div>
      <div class="prow"><span>🗣️ Mündlich</span><span class="pval">15. Sept. 2026</span></div>
    </div>
    <div class="pcard"><h3>💾 Daten</h3>
      <button class="pbtn" onclick="exportData()">⬇️ Fortschritt exportieren</button>
      <button class="pbtn" style="margin-top:6px" onclick="document.getElementById('imp').click()">⬆️ Fortschritt importieren</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this.files[0])"/>
      <button class="pbtn" style="margin-top:6px;color:#ef4444" onclick="resetData()">🔄 Zurücksetzen</button>
    </div>
    <div style="text-align:center;color:#475569;font-size:11px;padding:16px 0">
      Komplett: Tag 1–51 · ${C.length} Konzepte · ${C.length*4}+ Fragenvarianten<br/>
      PflegeTrainer 2.0 · Saarland 2026
    </div>`;
  app.appendChild(scr);
  renderNav(app);
}

function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)],{type:'application/json'}));
  a.download='pflege-fortschritt.json';a.click();
}
function importData(f){
  if(!f)return;const r=new FileReader();
  r.onload=e=>{try{ST=JSON.parse(e.target.result);save();render();alert('✅ Importiert!');}catch{alert('Fehler beim Import.');}};
  r.readAsText(f);
}
function resetData(){
  if(!confirm('Fortschritt zurücksetzen?'))return;
  ST={...DEFS};save();render();
}

// INIT
load();
render();

</script>
</body>
</html>
